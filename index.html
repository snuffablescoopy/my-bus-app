<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Bus Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        h2 { font-size: 0.8rem; color: #007bff; margin: 0 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; text-transform: uppercase; }
        .bus-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        .bus-no { font-weight: bold; font-size: 1.4rem; }
        .time { font-weight: bold; font-size: 1.4rem; color: #2ecc71; }
        #log { font-family: monospace; font-size: 10px; background: #222; color: #0f0; padding: 10px; border-radius: 10px; width: 100%; margin-top: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="update()">🔄 REFRESH BUS 185</button>

    <div class="card">
        <h2>Bus Stop 27449</h2>
        <div id="display">Connecting...</div>
    </div>

    <div id="log">Log: Initializing...</div>
</div>

<script>
    const API_KEY = '5WOBIXmsSTyK2fmx1NqlSA==';

    async function update() {
        const logBox = document.getElementById('log');
        const display = document.getElementById('display');
        
        logBox.innerText = "Log: Sending Request...";
        
        try {
            // THE CRITICAL URL: No trailing slashes, exact casing
            const ltaUrl = 'http://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=27449';
            
            // Using a cleaner proxy format
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(ltaUrl)}`;

            const response = await fetch(proxyUrl, {
                method: 'GET',
                headers: { 
                    'AccountKey': API_KEY,
                    'Accept': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error("Server Response: " + response.status);
            }

            const data = await response.json();
            logBox.innerText = "Log: Success! Data received.";

            let html = "";
            let found = false;

            if (data.Services && data.Services.length > 0) {
                data.Services.forEach(s => {
                    // Testing for Bus 185
                    if (s.ServiceNo === '185') {
                        found = true;
                        const arrival = s.NextBus.EstimatedArrival;
                        let wait = "No Data";
                        if (arrival) {
                            const diff = new Date(arrival) - new Date();
                            const mins = Math.max(0, Math.floor(diff / 60000));
                            wait = mins <= 0 ? "Arr" : mins + "m";
                        }
                        html += `<div class="bus-row"><span class="bus-no">${s.ServiceNo}</span><span class="time">${wait}</span></div>`;
                    }
                });
                display.innerHTML = found ? html : "Bus 185 not in service now.";
            } else {
                display.innerHTML = "No buses currently at this stop.";
            }

        } catch (err) {
            logBox.innerText = "Log Error: " + err.message;
            if (err.message.includes("404")) {
                display.innerHTML = "<span style='color:orange'>API URL Mismatch. Retrying...</span>";
            } else {
                display.innerHTML = "<span style='color:red'>Connection Failed.</span>";
            }
        }
    }

    window.onload = update;
</script>
</body>
</html>
