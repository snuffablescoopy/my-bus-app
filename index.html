<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .stop-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 350px; margin-left: auto; margin-right: auto; }
        h2 { font-size: 0.9rem; color: #007bff; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .row { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #f9f9f9; }
        .bus-no { font-weight: bold; font-size: 1.3rem; }
        .wait { font-weight: bold; color: #2ecc71; font-size: 1.3rem; }
        .refresh-btn { width: 100%; max-width: 350px; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; margin-bottom: 20px; }
        #debug { font-size: 10px; color: #999; margin-top: 20px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; display: block; }
    </style>
</head>
<body>

    <button class="refresh-btn" onclick="update()">🔄 REFRESH BUSES</button>

    <div class="stop-card">
        <h2>Orchard Stn (09022)</h2>
        <div id="results-09022">Waiting...</div>
    </div>

    <div class="stop-card">
        <h2>Opp Botanic Gdns (14121)</h2>
        <div id="results-14121">Waiting...</div>
    </div>

    <div id="debug">Log: Initialized...</div>

<script>
    var KEY = '5WOBIXmsSTyK2fmx1NqlSA==';
    
    function log(msg) {
        var d = document.getElementById('debug');
        d.innerHTML += "<br>> " + msg;
    }

    function update() {
        log("Update button clicked.");
        
        var stops = ['09022', '14121'];
        var busList = {
            '09022': ['190', '972'],
            '14121': ['66', '154']
        };

        for (var i = 0; i < stops.length; i++) {
            (function(stopId) {
                var display = document.getElementById('results-' + stopId);
                display.innerHTML = "Fetching...";
                
                log("Fetching stop: " + stopId);

                // DIRECT CALL
                var url = "http://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=" + stopId;

                fetch(url, {
                    method: 'GET',
                    headers: { 'AccountKey': KEY }
                })
                .then(function(response) {
                    log("Response received for " + stopId);
                    return response.json();
                })
                .then(function(data) {
                    log("Data parsed for " + stopId);
                    var html = "";
                    var services = data.Services || [];
                    
                    for (var j = 0; j < services.length; j++) {
                        var s = services[j];
                        if (busList[stopId].indexOf(s.ServiceNo) !== -1) {
                            var est = s.NextBus.EstimatedArrival;
                            var time = "-";
                            if (est) {
                                var diff = new Date(est) - new Date();
                                var mins = Math.max(0, Math.floor(diff / 60000));
                                time = (mins <= 0) ? "Arr" : mins + "m";
                            }
                            html += '<div class="row"><span class="bus-no">' + s.ServiceNo + '</span><span class="wait">' + time + '</span></div>';
                        }
                    }
                    display.innerHTML = html || "No buses running.";
                })
                .catch(function(err) {
                    log("ERROR at " + stopId + ": " + err);
                    display.innerHTML = "<span style='color:red'>Blocked. Check Site Settings (Allow Insecure Content).</span>";
                });
            })(stops[i]);
        }
    }

    // Run on startup
    window.onload = function() {
        log("Page loaded.");
        update();
    };
</script>

</body>
</html>
