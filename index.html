<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusWatch SG</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2128;
      --border: #252830;
      --accent: #e8ff47;
      --accent2: #47c8ff;
      --text: #e8eaf0;
      --muted: #6b7080;
      --green: #4ade80;
      --orange: #fb923c;
      --red: #f87171;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      padding: 36px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -150px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(232,255,71,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }

    .bus-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #0d0f14;
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 2px;
      margin-bottom: 10px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.live {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    .dot.error { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* View toggle: Next only vs Next 3 */
    .view-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .view-toggle button {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 6px 12px;
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-toggle button.active {
      background: var(--accent);
      color: #0d0f14;
      font-weight: 600;
    }

    .refresh-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
    }

    .toggle { position: relative; width: 34px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .slider { background: rgba(232,255,71,0.2); }
    input:checked + .slider::before { transform: translateX(16px); background: var(--accent); }

    .btn-refresh {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-refresh:hover { background: #d4e83a; }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Groups ── */
    .groups { display: flex; flex-direction: column; gap: 16px; }

    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .stop-code {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(232,255,71,0.08);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .stop-name { font-size: 13px; color: var(--text); flex: 1; min-width: 0; }
    .stop-road { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── Bus rows ── */
    .bus-rows { display: flex; flex-direction: column; }

    /* Next-only mode: 2 columns */
    .bus-row {
      display: grid;
      align-items: center;
      padding: 12px 18px;
      gap: 8px;
      min-height: 54px;
    }

    .bus-row + .bus-row { border-top: 1px solid var(--border); }

    /* Grid changes based on view mode */
    .mode-next .bus-row  { grid-template-columns: 64px 1fr; }
    .mode-three .bus-row { grid-template-columns: 64px 1fr 1fr 1fr; }

    .bus-num {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent2);
      letter-spacing: -0.02em;
    }

    .arrival-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    /* In next-only mode, make it bigger and left-aligned */
    .mode-next .arrival-cell {
      align-items: flex-start;
      flex-direction: row;
      gap: 10px;
      align-items: center;
    }

    .slot-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* hide label in next-only mode */
    .mode-next .slot-label { display: none; }

    .slot-time {
      font-size: 20px;
      font-weight: 500;
      line-height: 1;
    }

    /* Bigger in next-only mode */
    .mode-next .slot-time { font-size: 28px; }

    .slot-time.soon   { color: var(--red); }
    .slot-time.coming { color: var(--orange); }
    .slot-time.later  { color: var(--green); }
    .slot-time.na     { color: var(--muted); font-size: 16px !important; }

    .slot-unit { font-size: 10px; color: var(--muted); }
    .mode-next .slot-unit { font-size: 13px; }

    .bus-tag {
      display: inline-block;
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 2px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .mode-next .bus-tag { margin-top: 0; font-size: 9px; padding: 2px 6px; }

    .bus-tag.wab { background: rgba(71,200,255,0.15); color: var(--accent2); }
    .bus-tag.sd  { background: rgba(232,255,71,0.1);  color: var(--accent); }
    .bus-tag.dd  { background: rgba(251,146,60,0.15); color: var(--orange); }

    /* Loading skeleton */
    .slot-time.loading-val {
      color: var(--muted);
      font-size: 16px !important;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .error-row {
      padding: 14px 18px;
      font-size: 11px;
      color: var(--red);
    }

    /* proxy notice */
    .proxy-notice {
      background: rgba(251,146,60,0.08);
      border: 1px solid rgba(251,146,60,0.25);
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 11px;
      color: var(--orange);
      margin-bottom: 16px;
      display: none;
    }

    .proxy-notice.show { display: block; }

    .updated-bar {
      margin-top: 18px;
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    footer {
      margin-top: 8px;
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      opacity: 0.5;
      letter-spacing: 0.05em;
    }

    @media (max-width: 480px) {
      .mode-three .bus-row { grid-template-columns: 50px 1fr 1fr 1fr; padding: 10px 12px; }
      .mode-next  .bus-row { padding: 10px 12px; }
      .bus-num { font-size: 18px; }
      .mode-three .slot-time { font-size: 17px; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <div class="bus-badge">🚌 SG Transit</div>
      <h1>BUS<span>WATCH</span></h1>
      <p class="subtitle">Real-time arrivals · Jurong West / Bukit Batok / Tengah</p>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Loading…</span>
      </div>
      <div class="view-toggle">
        <button id="btnNext"  class="active" onclick="setView('next')">Next only</button>
        <button id="btnThree"            onclick="setView('three')">Next 3</button>
      </div>
      <label class="refresh-toggle">
        <div class="toggle">
          <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()" />
          <span class="slider"></span>
        </div>
        Auto 30s
      </label>
      <button class="btn-refresh" id="refreshBtn" onclick="fetchAll()">↻ Refresh</button>
    </div>
  </header>

  <div class="proxy-notice" id="proxyNotice">
    ⚠ Having trouble reaching the LTA API. Trying backup proxy… If this persists, try refreshing.
  </div>

  <div class="groups mode-next" id="groups"></div>

  <div class="updated-bar" id="updatedBar"></div>
  <footer>Data from LTA DataMall · Timings are estimates only</footer>

</div>
<script>
  const API_KEY = '5WOBIXmsSTyK2fmx1NqlSA==';
  const LTA_URL = 'https://datamall2.mytransport.sg/ltaodataservice/v3/BusArrival';

  // Two proxies — we try the first, fall back to second if it fails
  const PROXIES = [
    url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  ];

  const STOPS = [
    { code: '22009', name: 'Boon Lay Int',           road: 'Jurong West Ctrl 3',     buses: ['181', '180'] },
    { code: '21581', name: 'Blk 65',                 road: 'Corporation Dr',          buses: ['98'] },
    { code: '27449', name: 'Aft Westwood Ave',        road: 'Jurong West Ave 5',      buses: ['185'] },
    { code: '21161', name: 'Blk 216B',               road: 'Jurong West',             buses: ['157', '185'] },
    { code: '43531', name: 'Blk 140',                road: 'Bt Batok West Ave 3',     buses: ['157', '174'] },
    { code: '43769', name: 'Dulwich Coll / Blk 445', road: 'Bt Batok Rd',            buses: ['180'] },
    { code: '40389', name: 'Blk 119',                road: 'Plantation Cres, Tengah', buses: ['992'] },
  ];

  let autoTimer   = null;
  let viewMode    = 'next';   // 'next' | 'three'
  let activeProxy = 0;        // index into PROXIES

  // ── Fetch with automatic proxy fallback ──
  async function fetchLTA(stopCode, busNo) {
    const url = `${LTA_URL}?BusStopCode=${stopCode}&ServiceNo=${busNo}`;

    for (let attempt = 0; attempt < PROXIES.length; attempt++) {
      const proxyIdx = (activeProxy + attempt) % PROXIES.length;
      try {
        const res = await fetch(PROXIES[proxyIdx](url), {
          headers: { 'AccountKey': API_KEY, 'accept': 'application/json' },
          signal: AbortSignal.timeout(8000)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Validate: if Services is missing it's likely a proxy error page
        if (!Array.isArray(data.Services)) throw new Error('Bad response');

        // Promote this proxy if it worked after a fallback
        if (attempt > 0) {
          activeProxy = proxyIdx;
          document.getElementById('proxyNotice').classList.remove('show');
        }
        return data;
      } catch (e) {
        if (attempt === 0 && PROXIES.length > 1) {
          document.getElementById('proxyNotice').classList.add('show');
        }
        if (attempt === PROXIES.length - 1) throw e;
      }
    }
  }

  // ── Parse arrival time into minutes ──
  function getMin(iso) {
    // Reject missing, zero-date, or obviously invalid timestamps
    if (!iso || iso.startsWith('0001') || iso === '') return null;
    const diff = (new Date(iso) - Date.now()) / 60000;
    // If diff is wildly negative (bad data) treat as null
    if (diff < -2) return null;
    return Math.max(0, Math.round(diff));
  }

  // ── View toggle ──
  function setView(mode) {
    viewMode = mode;
    const grp = document.getElementById('groups');
    grp.className = mode === 'next' ? 'groups mode-next' : 'groups mode-three';
    document.getElementById('btnNext').className  = mode === 'next'  ? 'active' : '';
    document.getElementById('btnThree').className = mode === 'three' ? 'active' : '';
  }

  // ── Skeleton ──
  function buildSkeleton() {
    const container = document.getElementById('groups');
    container.innerHTML = '';
    STOPS.forEach(stop => {
      const g = document.createElement('div');
      g.className = 'group';
      g.innerHTML = `
        <div class="group-header">
          <span class="stop-code">${stop.code}</span>
          <span class="stop-name">${stop.name}</span>
          <span class="stop-road">${stop.road}</span>
        </div>
        <div class="bus-rows" id="rows-${stop.code}">
          ${stop.buses.map(b => skeletonRow(b)).join('')}
        </div>`;
      container.appendChild(g);
    });
  }

  function skeletonRow(busNo) {
    return `<div class="bus-row">
      <div class="bus-num">${busNo}</div>
      <div class="arrival-cell">
        <div class="slot-label">Next</div>
        <div class="slot-time loading-val">···</div>
      </div>
      <div class="arrival-cell">
        <div class="slot-label">2nd</div>
        <div class="slot-time loading-val">···</div>
      </div>
      <div class="arrival-cell">
        <div class="slot-label">3rd</div>
        <div class="slot-time loading-val">···</div>
      </div>
    </div>`;
  }

  // ── Fetch all stops ──
  async function fetchAll() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    setStatus('Fetching…', 'loading');

    const results = await Promise.allSettled(STOPS.map(s => fetchStop(s)));
    const errors = results.filter(r => r.status === 'rejected' || r.value === false).length;

    if (errors === 0) {
      setStatus('Live', 'live');
      document.getElementById('proxyNotice').classList.remove('show');
    } else if (errors < STOPS.length) {
      setStatus(`Live (${errors} error${errors > 1 ? 's' : ''})`, 'live');
    } else {
      setStatus('Failed to load', 'error');
    }

    document.getElementById('updatedBar').textContent =
      'Last updated: ' + new Date().toLocaleTimeString('en-SG', { hour12: false });
    btn.disabled = false;
  }

  async function fetchStop(stop) {
    const el = document.getElementById(`rows-${stop.code}`);
    try {
      const rows = await Promise.all(stop.buses.map(async busNo => {
        const data = await fetchLTA(stop.code, busNo);
        return renderRow(busNo, data.Services?.[0] ?? null);
      }));
      el.innerHTML = rows.join('');
      return true;
    } catch (e) {
      el.innerHTML = `<div class="error-row">⚠ Could not load: ${e.message}</div>`;
      return false;
    }
  }

  // ── Render one bus row ──
  function renderRow(busNo, svc) {
    const buses  = svc ? [svc.NextBus, svc.NextBus2, svc.NextBus3] : [null, null, null];
    const labels = ['Next', '2nd', '3rd'];

    const cells = buses.map((b, i) => {
      const min = getMin(b?.EstimatedArrival);
      let timeEl, unitEl = '', tagEl = '';

      if (min === null) {
        timeEl = `<div class="slot-time na">—</div>`;
      } else if (min === 0) {
        timeEl = `<div class="slot-time soon">Arr</div>`;
      } else {
        const cls = min <= 3 ? 'soon' : min <= 8 ? 'coming' : 'later';
        timeEl = `<div class="slot-time ${cls}">${min}</div>`;
        unitEl = `<div class="slot-unit">min</div>`;
      }

      if (b?.Type) {
        const m = { WAB: ['wab','WAB'], SD: ['sd','SD'], DD: ['dd','DD'] };
        const [c, l] = m[b.Type] || ['sd', b.Type];
        tagEl = `<span class="bus-tag ${c}">${l}</span>`;
      }

      return `<div class="arrival-cell">
        <div class="slot-label">${labels[i]}</div>
        ${timeEl}${unitEl}${tagEl}
      </div>`;
    }).join('');

    return `<div class="bus-row"><div class="bus-num">${busNo}</div>${cells}</div>`;
  }

  function setStatus(text, state) {
    document.getElementById('statusText').textContent = text;
    const dot = document.getElementById('statusDot');
    dot.className = 'dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  }

  function toggleAutoRefresh() {
    clearInterval(autoTimer);
    if (document.getElementById('autoRefresh').checked) {
      autoTimer = setInterval(fetchAll, 30000);
    }
  }

  buildSkeleton();
  fetchAll();
</script>
</body>
</html>
