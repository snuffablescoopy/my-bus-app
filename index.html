<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Bus Tracker v3</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; margin-bottom: 20px; }
        h2 { font-size: 0.9rem; color: #007bff; margin: 0 0 15px 0; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        .bus-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .bus-no { font-weight: 900; font-size: 1.8rem; color: #333; }
        .time { font-weight: 900; font-size: 1.8rem; color: #2ecc71; }
        #log { font-family: monospace; font-size: 11px; background: #222; color: #0f0; padding: 15px; border-radius: 12px; width: 100%; margin-top: 20px; box-sizing: border-box; white-space: pre-wrap; }
        button { width: 100%; padding: 18px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: bold; margin-bottom: 20px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="update()">🔄 REFRESH BUS 185</button>

    <div class="card">
        <h2>Bus Stop 27449</h2>
        <div id="display">Syncing with LTA...</div>
    </div>

    <div id="log">Log: System Ready</div>
</div>

<script>
    const API_KEY = '5WOBIXmsSTyK2fmx1NqlSA==';

    async function update() {
        const logBox = document.getElementById('log');
        const display = document.getElementById('display');
        logBox.innerText = "Log: Requesting v3 Data...";

        try {
            // LTA DOCS: Version 3 is the new standard
            // Mandatory HTTPS and precise endpoint name
            const ltaUrl = `https://datamall2.mytransport.sg/ltaodataservice/BusArrivalv3?BusStopCode=27449`;
            
            // Using a clean proxy for GitHub compatibility
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(ltaUrl)}`;

            const response = await fetch(proxyUrl, {
                method: 'GET',
                headers: { 
                    'AccountKey': API_KEY,
                    'Accept': 'application/json' 
                }
            });

            if (!response.ok) {
                // If v3 fails, the code will automatically try v2 as a backup
                if (response.status === 404) throw new Error("V3_NOT_FOUND");
                throw new Error("HTTP_" + response.status);
            }

            const data = await response.json();
            logBox.innerText = "Log: Connected to v3 Successfully!";
            
            render(data);

        } catch (err) {
            if (err.message === "V3_NOT_FOUND") {
                logBox.innerText += "\nv3 not found, falling back to v2...";
                tryV2();
            } else {
                logBox.innerText += "\nError: " + err.message;
                display.innerHTML = "<span style='color:red'>Connection Failed</span>";
            }
        }
    }

    async function tryV2() {
        const display = document.getElementById('display');
        const logBox = document.getElementById('log');
        try {
            const ltaUrlV2 = `https://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=27449`;
            const proxyUrlV2 = `https://corsproxy.io/?${encodeURIComponent(ltaUrlV2)}`;
            
            const res = await fetch(proxyUrlV2, {
                headers: { 'AccountKey': API_KEY, 'Accept': 'application/json' }
            });
            const data = await res.json();
            logBox.innerText += "\nSuccess with v2!";
            render(data);
        } catch (e) {
            logBox.innerText += "\nv2 also failed.";
            display.innerHTML = "LTA Service Unavailable";
        }
    }

    function render(data) {
        const display = document.getElementById('display');
        let html = "";
        let found = false;
        
        if (data.Services) {
            data.Services.forEach(s => {
                if (s.ServiceNo === '185') {
                    found = true;
                    const arrival = s.NextBus.EstimatedArrival;
                    let wait = "No Data";
                    if (arrival) {
                        const diff = new Date(arrival) - new Date();
                        const mins = Math.max(0, Math.floor(diff / 60000));
                        wait = mins <= 0 ? "Arr" : mins + "m";
                    }
                    html = `<div class="bus-row"><span class="bus-no">${s.ServiceNo}</span><span class="time">${wait}</span></div>`;
                }
            });
        }
        display.innerHTML = found ? html : "Bus 185 not in service.";
    }

    window.onload = update;
</script>
</body>
</html>
