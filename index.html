<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Bus Arrival</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; margin-top: 20px; }
        .stop-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        h2 { margin: 0 0 15px 0; color: #007bff; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f9f9f9; }
        .bus-no { font-weight: 900; font-size: 1.5rem; color: #333; }
        .wait { font-weight: 800; font-size: 1.5rem; color: #2ecc71; }
        .soon { color: #e74c3c; animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        #status { text-align: center; font-size: 0.75rem; color: #7f8c8d; margin-top: 20px; }
        .refresh-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
