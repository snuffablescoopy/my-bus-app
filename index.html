<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracker Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .stop-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        h2 { margin: 0 0 15px 0; color: #007bff; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .bus-no { font-weight: 900; font-size: 1.5rem; color: #333; }
        .wait { font-weight: 800; font-size: 1.5rem; color: #2ecc71; }
        .refresh-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        #debug { width: 100%; max-width: 400px; font-family: monospace; font-size: 10px; background: #333; color: #0f0; padding: 10px; border-radius: 10px; margin-top: 20px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <button class="refresh-btn" onclick="update()">🔄 REFRESH BUSES</button>

    <div class="stop-card">
        <h2>Orchard Stn (09022)</h2>
        <div id="results-09022">Waiting...</div>
    </div>

    <div class="stop-card">
        <h2>Opp Botanic Gdns (14121)</h2>
        <div id="results-14121">Waiting...</div>
    </div>

    <div id="debug">Log: System Start...</div>
</div>

<script>
    var API_KEY = '5WOBIXmsSTyK2fmx1NqlSA=='.trim();
    
    function log(msg) {
        var d = document.getElementById('debug');
        d.innerHTML += "<br>> " + msg;
        console.log(msg);
    }

    function update() {
        log("Fetching fresh data...");
        var targets = [
            { id: '09022', buses: ['190', '972'] },
            { id: '14121', buses: ['66', '154'] }
        ];

        targets.forEach(function(t) {
            var display = document.getElementById('results-' + t.id);
            // Force HTTPS to satisfy GitHub's security
            var url = "https://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=" + t.id;

            fetch(url, {
                method: 'GET',
                headers: { 'AccountKey': API_KEY }
            })
            .then(function(response) {
                if (!response.ok) throw new Error("HTTP " + response.status);
                return response.json();
            })
            .then(function(data) {
                log("Data received for " + t.id);
                var html = "";
                var found = false;

                data.Services.forEach(function(s) {
                    if (t.buses.indexOf(s.ServiceNo) !== -1) {
                        found = true;
                        var est = s.NextBus.EstimatedArrival;
                        var wait = "-";
                        if (est) {
                            var diff = new Date(est) - new Date();
                            var mins = Math.max(0, Math.floor(diff / 60000));
                            wait = mins <= 0 ? "Arr" : mins + "m";
                        }
                        html += '<div class="row"><span class="bus-no">' + s.ServiceNo + '</span><span class="wait">' + wait + '</span></div>';
                    }
                });

                display.innerHTML = html || "No matching buses found.";
            })
            .catch(function(err) {
                log("FAILED " + t.id + ": " + err.message);
                display.innerHTML = "<div style='color:red; font-size:12px;'>Block detected. Tap lock icon > Site Settings > Insecure Content > Allow.</div>";
            });
        });
    }
