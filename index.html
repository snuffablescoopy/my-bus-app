<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Bus Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 400px; }
        .stop-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        h2 { margin: 0 0 10px 0; color: #007bff; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .bus-no { font-weight: 900; font-size: 1.5rem; color: #333; }
        .wait { font-weight: 800; font-size: 1.5rem; color: #2ecc71; }
        #debug { width: 100%; max-width: 400px; font-family: monospace; font-size: 10px; background: #222; color: #0f0; padding: 10px; border-radius: 10px; margin-top: 20px; min-height: 40px; }
        .refresh-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <button class="refresh-btn" onclick="update()">🔄 REFRESH BUSES</button>
    <div id="stop-09022" class="stop-card"><h2>Orchard Stn (09022)</h2><div class="results">Loading...</div></div>
    <div id="stop-14121" class="stop-card"><h2>Opp Botanic Gdns (14121)</h2><div class="results">Loading...</div></div>
    <div id="debug">Log: Initializing...</div>
</div>

<script>
    const API_KEY = '5WOBIXmsSTyK2fmx1NqlSA==';
    const targets = [
        { id: '09022', buses: ['190', '972'] },
        { id: '14121', buses: ['66', '154'] }
    ];

    async function update() {
        document.getElementById('debug').innerText = "Log: Fetching...";
        
        for (const target of targets) {
            const container = document.querySelector(`#stop-${target.id} .results`);
            try {
                const ltaUrl = `http://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=${target.id}`;
                // Using CORSproxy.io - very reliable and high-capacity
                const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(ltaUrl)}`;

                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: { 'AccountKey': API_KEY }
                });

                if (!response.ok) throw new Error("Proxy Error " + response.status);

                const data = await response.json();
                let html = "";
                
                if (data.Services && data.Services.length > 0) {
                    data.Services.forEach(s => {
                        if (target.buses.includes(s.ServiceNo)) {
                            const est = s.NextBus.EstimatedArrival;
                            let wait = "-";
                            if (est) {
                                const diff = new Date(est) - new Date();
                                const mins = Math.max(0, Math.floor(diff / 60000));
                                wait = mins <= 0 ? "Arr" : mins + "m";
                            }
                            html += `<div class="row"><span class="bus-no">${s.ServiceNo}</span><span class="wait">${wait}</span></div>`;
                        }
                    });
                }
                container.innerHTML = html || "No buses running.";
                document.getElementById('debug').innerText = "Log: Success at " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error(err);
                document.getElementById('debug').innerText = "Log Error: " + err.message;
                container.innerHTML = "<div style='color:red'>Connection Error. Refresh?</div>";
            }
        }
    }

    update();
    setInterval(update, 30000);
</script>
</body>
</html>
