<script>
    // I added .trim() to ensure no hidden spaces exist
    const KEY = '5WOBIXmsSTyK2fmx1NqlSA=='.trim();
    
    const targets = [
        { id: '09022', buses: ['190', '972'] },
        { id: '14121', buses: ['66', '154'] }
    ];

    async function update() {
        document.getElementById('status').innerText = "Updating...";
        
        for (let t of targets) {
            const container = document.querySelector(`#stop-${t.id} .results`);
            try {
                // Using a slightly different proxy URL structure that LTA likes better
                const lta = `http://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=${t.id}`;
                const url = `https://corsproxy.io/?url=${encodeURIComponent(lta)}`;

                const res = await fetch(url, {
                    headers: {
                        'AccountKey': KEY,
                        'Accept': 'application/json'
                    }
                });

                const data = await res.json();

                // DEBUG: If no services, let's see what LTA actually sent
                if (!data.Services || data.Services.length === 0) {
                    container.innerHTML = "<div style='color:orange'>Stop found, but no buses active.</div>";
                    continue;
                }

                container.innerHTML = "";
                
                // Show ALL buses for a moment to test if it's working
                data.Services.forEach(bus => {
                    const arrival = bus.NextBus.EstimatedArrival;
                    let waitText = "-";
                    let isSoon = false;

                    if (arrival) {
                        const mins = Math.floor((new Date(arrival) - new Date()) / 60000);
                        waitText = mins <= 0 ? 'Arr' : mins + 'm';
                        isSoon = mins < 3;
                    }

                    // Only show the buses you wanted
                    if (t.buses.includes(bus.ServiceNo)) {
                        container.innerHTML += `
                            <div class="row">
                                <span class="bus-no">${bus.ServiceNo}</span>
                                <span class="wait ${isSoon ? 'soon' : ''}">${waitText}</span>
                            </div>`;
                    }
                });

                // If after filtering nothing is left
                if (container.innerHTML === "") {
                    container.innerHTML = "<div style='color:#999'>Target buses not currently running.</div>";
                }

            } catch (e) {
                console.error(e);
                container.innerHTML = "<div style='color:red'>Connection Error</div>";
            }
        }
        document.getElementById('status').innerText = "Last Sync: " + new Date().toLocaleTimeString();
    }

    update();
    setInterval(update, 30000);
</script>
