<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Bus Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { font-size: 0.8rem; color: #007bff; margin: 0 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .bus-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 1.2rem; font-weight: bold; }
        .time { color: #2ecc71; }
        #log { font-family: monospace; font-size: 10px; background: #222; color: #0f0; padding: 10px; border-radius: 10px; width: 100%; margin-top: 20px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="update()">REFRESH TIMINGS</button>

    <div class="card">
        <h2>Orchard Stn (09022)</h2>
        <div id="stop-09022">Loading...</div>
    </div>

    <div class="card">
        <h2>Opp Botanic Gdns (14121)</h2>
        <div id="stop-14121">Loading...</div>
    </div>

    <div id="log">Status: Initializing...</div>
</div>

<script>
    // CRITICAL: Double check your key. It should be 24 characters ending in ==
    const KEY = '5WOBIXmsSTyK2fmx1NqlSA=='.trim();

    async function update() {
        const statusLog = document.getElementById('log');
        statusLog.innerText = "Status: Fetching data...";

        const targets = [
            { id: '09022', buses: ['190', '972'] },
            { id: '14121', buses: ['66', '154'] }
        ];

        for (const t of targets) {
            const display = document.getElementById(`stop-${t.id}`);
            try {
                // Using a proxy that allows us to pass the AccountKey more reliably
                const ltaUrl = `http://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=${t.id}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(ltaUrl)}`;

                const response = await fetch(proxyUrl, {
                    headers: { 'AccountKey': KEY }
                });

                const wrapper = await response.json();
                
                // AllOrigins wraps the LTA response inside a "contents" string
                if (!wrapper.contents) throw new Error("Proxy Empty");
                
                const data = JSON.parse(wrapper.contents);
                let html = "";

                if (data.Services) {
                    data.Services.forEach(s => {
                        if (t.buses.includes(s.ServiceNo)) {
                            const arrival = s.NextBus.EstimatedArrival;
                            let wait = "-";
                            if (arrival) {
                                const diff = new Date(arrival) - new Date();
                                const mins = Math.max(0, Math.floor(diff / 60000));
                                wait = mins <= 0 ? "Arr" : mins + "m";
                            }
                            html += `<div class="bus-row"><span>${s.ServiceNo}</span><span class="time">${wait}</span></div>`;
                        }
                    });
                }

                display.innerHTML = html || "No buses found.";
                statusLog.innerText = "Status: Updated " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error(err);
                statusLog.innerText = "Status Error: " + err.message;
                display.innerHTML = "Check API Key or Proxy.";
            }
        }
    }

    window.onload = update;
</script>
</body>
</html>
