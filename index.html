<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        h2 { margin: 0 0 10px 0; color: #007bff; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .bus-no { font-weight: 900; font-size: 1.5rem; color: #333; }
        .wait { font-weight: 800; font-size: 1.5rem; color: #2ecc71; }
        #log { width: 100%; font-family: monospace; font-size: 10px; background: #222; color: #0f0; padding: 10px; border-radius: 10px; margin-top: 20px; min-height: 40px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="update()">🔄 REFRESH BUSES</button>
    
    <div class="card">
        <h2>Bus Stop 27449</h2>
        <div id="results-27449">Loading...</div>
    </div>

    <div id="log">Log: Ready</div>
</div>

<script>
    const API_KEY = '5WOBIXmsSTyK2fmx1NqlSA==';
    
    async function update() {
        const logBox = document.getElementById('log');
        logBox.innerText = "Log: Fetching...";
        
        const stopId = '27449';
        const display = document.getElementById('results-' + stopId);

        try {
            const ltaUrl = `https://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=${stopId}`;
            
            // This proxy is much more reliable for LTA's specific headers
            const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(ltaUrl)}`;

            const response = await fetch(proxyUrl, {
                method: 'GET',
                headers: { 
                    'AccountKey': API_KEY,
                    'Accept': 'application/json'
                }
            });

            if (!response.ok) throw new Error("Proxy Error: " + response.status);

            const data = await response.json();
            logBox.innerText = "Log: Data Received!";

            let html = "";
            if (data.Services && data.Services.length > 0) {
                // We will show ALL buses at the stop first to prove it's working
                data.Services.forEach(s => {
                    const arrival = s.NextBus.EstimatedArrival;
                    let wait = "-";
                    if (arrival) {
                        const diff = new Date(arrival) - new Date();
                        const mins = Math.max(0, Math.floor(diff / 60000));
                        wait = mins <= 0 ? "Arr" : mins + "m";
                    }
                    html += `<div class="row"><span class="bus-no">${s.ServiceNo}</span><span class="wait">${wait}</span></div>`;
                });
                display.innerHTML = html;
            } else {
                display.innerHTML = "No active buses at this stop.";
            }

        } catch (err) {
            logBox.innerText = "Log Error: " + err.message;
            display.innerHTML = "<span style='color:red'>Key Rejected. check your LTA email to ensure the key is exactly right.</span>";
        }
    }

    window.onload = update;
</script>
</body>
</html>
