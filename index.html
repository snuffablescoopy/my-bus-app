<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Bus Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 400px; margin-top: 20px; }
        .stop-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); border: 1px solid #eee; }
        h2 { margin: 0 0 15px 0; color: #007bff; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .bus-no { font-weight: 900; font-size: 1.4rem; color: #333; }
        .wait { font-weight: 800; font-size: 1.4rem; color: #2ecc71; }
        .soon { color: #e74c3c; animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        #status { text-align: center; font-size: 0.75rem; color: #7f8c8d; margin-top: 20px; }
        .refresh-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <button class="refresh-btn" onclick="update()">🔄 REFRESH BUS TIMINGS</button>

    <div id="stop-09022" class="stop-card">
        <h2>Orchard Stn (09022)</h2>
        <div class="results">Loading...</div>
    </div>

    <div id="stop-14121" class="stop-card">
        <h2>Opp Botanic Gdns (14121)</h2>
        <div class="results">Loading...</div>
    </div>

    <div id="status">Syncing...</div>
</div>

<script>
    // YOUR API KEY
    const KEY = '5WOBIXmsSTyK2fmx1NqlSA==';
    
    const targets = [
        { id: '09022', buses: ['190', '972'] },
        { id: '14121', buses: ['66', '154'] }
    ];

    async function update() {
        document.getElementById('status').innerText = "Updating...";
        
        for (let t of targets) {
            const container = document.querySelector(`#stop-${t.id} .results`);
            try {
                // We use a proxy that handles the AccountKey for us via the URL
                const lta = `http://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=${t.id}`;
                const url = `https://corsproxy.io/?url=${encodeURIComponent(lta)}&key=${KEY}`;

                const res = await fetch(url);
                const data = await res.json();

                if (!data.Services) {
                    container.innerHTML = "No Data";
                    continue;
                }

                const filtered = data.Services.filter(s => t.buses.includes(s.ServiceNo));
                container.innerHTML = "";

                filtered.forEach(bus => {
                    const arrival = bus.NextBus.EstimatedArrival;
                    let waitText = "-";
                    let isSoon = false;

                    if (arrival) {
                        const mins = Math.floor((new Date(arrival) - new Date()) / 60000);
                        waitText = mins <= 0 ? 'Arr' : mins + 'm';
                        isSoon = mins < 3;
                    }

                    container.innerHTML += `
                        <div class="row">
                            <span class="bus-no">${bus.ServiceNo}</span>
                            <span class="wait ${isSoon ? 'soon' : ''}">${waitText}</span>
                        </div>`;
                });

            } catch (e) {
                container.innerHTML = "<div style='color:red'>Key Rejected</div>";
            }
        }
        document.getElementById('status').innerText = "Last Sync: " + new Date().toLocaleTimeString();
    }

    update();
    setInterval(update, 30000);
</script>

</body>
</html>
