<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Bus Tracker</title>
    <style>
        /* Modern, Clean Mobile Styling */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f0f2f5; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            margin: 0;
        }
        .container { width: 100%; max-width: 400px; }
        .stop-card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            border: 1px solid rgba(0,0,0,0.05); 
        }
        h2 { 
            margin: 0 0 15px 0; 
            color: #007bff; 
            font-size: 0.85rem; 
            letter-spacing: 1px;
            text-transform: uppercase; 
            border-bottom: 2px solid #f0f2f5; 
            padding-bottom: 10px; 
        }
        .row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid #f9f9f9; 
        }
        .row:last-child { border-bottom: none; }
        .bus-no { font-weight: 900; font-size: 1.5rem; color: #1a1a1a; }
        .wait { font-weight: 800; font-size: 1.5rem; color: #2ecc71; }
        
        /* Animation for approaching buses */
        .soon { color: #e74c3c; animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        #status { 
            text-align: center; 
            font-size: 0.75rem; 
            color: #7f8c8d; 
            margin-top: 25px; 
            font-weight: 500;
