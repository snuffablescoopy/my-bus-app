<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Bus Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .stop-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        h2 { margin: 0 0 15px 0; color: #007bff; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .bus-no { font-weight: 900; font-size: 1.5rem; color: #333; }
        .wait { font-weight: 800; font-size: 1.5rem; color: #2ecc71; }
        .refresh-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        #debug { width: 100%; max-width: 400px; font-family: monospace; font-size: 10px; background: #222; color: #0f0; padding: 10px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <button class="refresh-btn" onclick="update()">🔄 REFRESH BUSES</button>
    <div id="results-09022" class="stop-card"><h2>Orchard Stn (09022)</h2><div class="list">Loading...</div></div>
    <div id="results-14121" class="stop-card"><h2>Opp Botanic Gdns (14121)</h2><div class="list">Loading...</div></div>
    <div id="debug">Log: Starting...</div>
</div>

<script>
    var API_KEY = '5WOBIXmsSTyK2fmx1NqlSA==';
    
    function log(msg) {
        document.getElementById('debug').innerHTML = "Log: " + msg;
    }

    async function update() {
        log("Contacting Proxy...");
        var targets = [
            { id: '09022', buses: ['190', '972'] },
            { id: '14121', buses: ['66', '154'] }
        ];

        for (const t of targets) {
            const listDiv = document.querySelector(`#results-${t.id} .list`);
            try {
                // We use AllOrigins proxy and encode the URL twice to bypass LTA's block
                const ltaUrl = `http://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=${t.id}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(ltaUrl)}`;

                const response = await fetch(proxyUrl);
                const wrapper = await response.json();
                
                // If the proxy failed to get data
                if (!wrapper.contents) {
                    throw new Error("Empty Proxy Response");
                }

                // Check if LTA sent an error inside the successful proxy response
                if (wrapper.contents.includes("Unauthorized")) {
                    listDiv.innerHTML = "<span style='color:red'>Key Error (401)</span>";
                    continue;
                }

                // But wait! LTA needs the AccountKey. AllOrigins doesn't pass headers.
                // WE MUST USE A DIFFERENT PROXY THAT SUPPORTS HEADERS.
                // Let's try ThingProxy.
                const thingUrl = `https://thingproxy.freeboard.io/fetch/${ltaUrl}`;
                
                const finalResp = await fetch(thingUrl, {
                    headers: { 'AccountKey': API_KEY }
                });
                
                const data = await finalResp.json();
                log("Data success!");

                let html = "";
                data.Services.forEach(s => {
                    if (t.buses.includes(s.ServiceNo)) {
                        const est = s.NextBus.EstimatedArrival;
                        let wait = "-";
                        if (est) {
                            const mins = Math.max(0, Math.floor((new Date(est) - new Date()) / 60000));
                            wait = mins <= 0 ? "Arr" : mins + "m";
                        }
                        html += `<div class="row"><span class="bus-no">${s.ServiceNo}</span><span class="wait">${wait}</span></div>`;
                    }
                });
                listDiv.innerHTML = html || "No buses found.";

            } catch (err) {
                log("Error: " + err.message);
                listDiv.innerHTML = "Connection unstable. Tap Refresh.";
            }
        }
    }

    window.onload = update;
</script>
</body>
</html>
