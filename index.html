<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusWatch SG</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2128;
      --border: #252830;
      --accent: #e8ff47;
      --accent2: #47c8ff;
      --text: #e8eaf0;
      --muted: #6b7080;
      --green: #4ade80;
      --orange: #fb923c;
      --red: #f87171;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      padding: 36px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -150px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(232,255,71,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }

    .bus-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #0d0f14;
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 2px;
      margin-bottom: 10px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.live {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .refresh-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
    }

    .toggle { position: relative; width: 34px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .slider { background: rgba(232,255,71,0.2); }
    input:checked + .slider::before { transform: translateX(16px); background: var(--accent); }

    .btn-refresh {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-refresh:hover { background: #d4e83a; }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Groups ── */
    .groups {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .stop-code {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(232,255,71,0.08);
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.02em;
    }

    .stop-name {
      font-size: 13px;
      color: var(--text);
      flex: 1;
      min-width: 0;
    }

    .stop-road {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Bus rows ── */
    .bus-rows { display: flex; flex-direction: column; }

    .bus-row {
      display: grid;
      grid-template-columns: 64px 1fr 1fr 1fr;
      align-items: center;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border));
      gap: 8px;
      min-height: 54px;
    }

    .bus-row:last-child { border-bottom: none; }

    .bus-row + .bus-row { border-top: 1px solid var(--border); }

    .bus-num {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent2);
      letter-spacing: -0.02em;
    }

    .arrival-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .slot-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .slot-time {
      font-size: 20px;
      font-weight: 500;
      line-height: 1;
    }

    .slot-time.soon   { color: var(--red); }
    .slot-time.coming { color: var(--orange); }
    .slot-time.later  { color: var(--green); }
    .slot-time.na     { color: var(--muted); font-size: 14px; }
    .slot-time.loading-val { color: var(--muted); font-size: 14px; animation: blink 1.2s infinite; }

    .slot-unit { font-size: 9px; color: var(--muted); letter-spacing: 0.06em; }

    .bus-tag {
      display: inline-block;
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 2px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .bus-tag.wab { background: rgba(71,200,255,0.15); color: var(--accent2); }
    .bus-tag.sd  { background: rgba(232,255,71,0.1);  color: var(--accent); }
    .bus-tag.dd  { background: rgba(251,146,60,0.15); color: var(--orange); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .error-row {
      padding: 14px 18px;
      font-size: 11px;
      color: var(--red);
    }

    /* ── Footer bar ── */
    .updated-bar {
      margin-top: 18px;
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    footer {
      margin-top: 8px;
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      opacity: 0.5;
      letter-spacing: 0.05em;
    }

    @media (max-width: 480px) {
      .bus-row { grid-template-columns: 50px 1fr 1fr 1fr; padding: 10px 12px; }
      .bus-num { font-size: 18px; }
      .slot-time { font-size: 17px; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <div class="bus-badge">🚌 SG Transit</div>
      <h1>BUS<span>WATCH</span></h1>
      <p class="subtitle">Real-time arrivals · Jurong West / Bukit Batok / Tengah</p>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Loading…</span>
      </div>
      <label class="refresh-toggle">
        <div class="toggle">
          <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()" />
          <span class="slider"></span>
        </div>
        Auto 30s
      </label>
      <button class="btn-refresh" id="refreshBtn" onclick="fetchAll()">↻ Refresh</button>
    </div>
  </header>

  <div class="groups" id="groups"></div>

  <div class="updated-bar" id="updatedBar"></div>
  <footer>Data from LTA DataMall · Timings are estimates only</footer>

</div>
<script>
  const API_KEY = '5WOBIXmsSTyK2fmx1NqlSA==';
  const PROXY   = 'https://corsproxy.io/?url=';
  const LTA_URL = 'https://datamall2.mytransport.sg/ltaodataservice/v3/BusArrival';

  // Stops ordered geographically: Boon Lay → Corporation Dr → Jurong West Ave 5
  // → Jurong West (Blk 216B) → Bt Batok West → Bt Batok Rd → Tengah
  const STOPS = [
    { code: '22009', name: 'Boon Lay Int',          road: 'Jurong West Ctrl 3',  buses: ['181', '180'] },
    { code: '21581', name: 'Blk 65',                road: 'Corporation Dr',       buses: ['98'] },
    { code: '27449', name: 'Aft Westwood Ave',       road: 'Jurong West Ave 5',   buses: ['185'] },
    { code: '21161', name: 'Blk 216B',              road: 'Jurong West',          buses: ['157', '185'] },
    { code: '43531', name: 'Blk 140',               road: 'Bt Batok West Ave 3',  buses: ['157', '174'] },
    { code: '43769', name: 'Dulwich Coll / Blk 445',road: 'Bt Batok Rd',         buses: ['180'] },
    { code: '40389', name: 'Blk 119',               road: 'Plantation Cres, Tengah', buses: ['992'] },
  ];

  let autoTimer = null;

  function buildSkeleton() {
    const container = document.getElementById('groups');
    container.innerHTML = '';
    STOPS.forEach(stop => {
      const g = document.createElement('div');
      g.className = 'group';
      g.innerHTML = `
        <div class="group-header">
          <span class="stop-code">${stop.code}</span>
          <span class="stop-name">${stop.name}</span>
          <span class="stop-road">${stop.road}</span>
        </div>
        <div class="bus-rows" id="rows-${stop.code}">
          ${stop.buses.map(b => skeletonRow(b)).join('')}
        </div>`;
      container.appendChild(g);
    });
  }

  function skeletonRow(busNo) {
    return `<div class="bus-row">
      <div class="bus-num">${busNo}</div>
      ${['Next','2nd','3rd'].map(l => `
        <div class="arrival-cell">
          <div class="slot-label">${l}</div>
          <div class="slot-time loading-val">···</div>
        </div>`).join('')}
    </div>`;
  }

  async function fetchAll() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    setStatus('Fetching…', false);

    const results = await Promise.allSettled(STOPS.map(s => fetchStop(s)));
    const allOk = results.every(r => r.status === 'fulfilled' && r.value);
    setStatus(allOk ? 'Live' : 'Partial data', allOk);
    document.getElementById('updatedBar').textContent =
      'Last updated: ' + new Date().toLocaleTimeString('en-SG', { hour12: false });
    btn.disabled = false;
  }

  async function fetchStop(stop) {
    const el = document.getElementById(`rows-${stop.code}`);
    try {
      const rows = await Promise.all(stop.buses.map(async busNo => {
        const url = `${LTA_URL}?BusStopCode=${stop.code}&ServiceNo=${busNo}`;
        const res = await fetch(PROXY + encodeURIComponent(url), {
          headers: { 'AccountKey': API_KEY, 'accept': 'application/json' }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return renderRow(busNo, data.Services?.[0] ?? null);
      }));
      el.innerHTML = rows.join('');
      return true;
    } catch (e) {
      el.innerHTML = `<div class="error-row">⚠ ${stop.code}: ${e.message}</div>`;
      return false;
    }
  }

  function renderRow(busNo, svc) {
    const buses = svc ? [svc.NextBus, svc.NextBus2, svc.NextBus3] : [null, null, null];
    const labels = ['Next', '2nd', '3rd'];

    const cells = buses.map((b, i) => {
      const min = getMin(b?.EstimatedArrival);
      let timeEl, unitEl = '', tagEl = '';

      if (min === null) {
        timeEl = `<div class="slot-time na">—</div>`;
      } else if (min === 0) {
        timeEl = `<div class="slot-time soon">ARR</div>`;
      } else {
        const cls = min <= 3 ? 'soon' : min <= 8 ? 'coming' : 'later';
        timeEl = `<div class="slot-time ${cls}">${min}</div>`;
        unitEl = `<div class="slot-unit">min</div>`;
      }

      if (b?.Type) {
        const m = { WAB: ['wab','WAB'], SD: ['sd','SD'], DD: ['dd','DD'] };
        const [c, l] = m[b.Type] || ['sd', b.Type];
        tagEl = `<span class="bus-tag ${c}">${l}</span>`;
      }

      return `<div class="arrival-cell">
        <div class="slot-label">${labels[i]}</div>
        ${timeEl}${unitEl}${tagEl}
      </div>`;
    }).join('');

    return `<div class="bus-row"><div class="bus-num">${busNo}</div>${cells}</div>`;
  }

  function getMin(iso) {
    if (!iso || iso.startsWith('0001')) return null;
    return Math.max(0, Math.round((new Date(iso) - Date.now()) / 60000));
  }

  function setStatus(text, live) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('statusDot').className = 'dot' + (live ? ' live' : '');
  }

  function toggleAutoRefresh() {
    clearInterval(autoTimer);
    if (document.getElementById('autoRefresh').checked) {
      autoTimer = setInterval(fetchAll, 30000);
    }
  }

  buildSkeleton();
  fetchAll();
</script>
</body>
</html>
