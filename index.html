<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Debugger</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: white; }
        #debug-log { background: #000; padding: 10px; border: 1px solid #444; font-family: monospace; font-size: 12px; height: 300px; overflow-y: scroll; border-radius: 8px; }
        .error { color: #ff6b6b; }
        .info { color: #51cf66; }
    </style>
</head>
<body>

    <h3>LTA API Debugger</h3>
    <button onclick="testRequest()" style="padding: 10px; width: 100%;">RUN TEST</button>
    <p>Status: <span id="status">Idle</span></p>
    
    <div id="debug-log"></div>

<script>
    const API_KEY = '5WOBIXmsSTyK2fmx1NqlSA==';
    const logEl = document.getElementById('debug-log');

    function log(msg, isError = false) {
        const div = document.createElement('div');
        div.className = isError ? 'error' : 'info';
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logEl.prepend(div);
    }

    async function testRequest() {
        document.getElementById('status').innerText = "Testing...";
        log("Starting request...");

        const busStop = '09022';
        const ltaUrl = `http://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=${busStop}`;
        
        // We will try a different proxy approach here
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(ltaUrl)}`;

        try {
            log(`Fetching via Proxy: AllOrigins...`);
            const response = await fetch(proxyUrl);
            
            if (!response.ok) {
                throw new Error(`Proxy responded with status: ${response.status}`);
            }

            const wrapper = await response.json();
            log("Proxy connection successful.");

            // If using AllOrigins, the LTA response is inside .contents
            // But AllOrigins doesn't pass custom headers like AccountKey 
            // unless we do it via a different service.
            
            if (wrapper.contents.includes("Unauthorized") || wrapper.contents.includes("Access Denied")) {
                log("LTA rejected the key. Check if key is active or headers are missing.", true);
            } else {
                log("Data received! Check contents: " + wrapper.contents.substring(0, 100) + "...");
            }

        } catch (err) {
            log("FETCH FAILED: " + err.message, true);
            log("Possible cause: CORS block or Local File restriction.", true);
        }
        document.getElementById('status').innerText = "Test Complete";
    }
</script>
</body>
</html>
