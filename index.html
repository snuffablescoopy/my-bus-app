<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Test 185</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { font-size: 0.9rem; color: #007bff; margin: 0 0 15px 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .bus-row { display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: bold; }
        .time { color: #2ecc71; }
        #log { font-family: monospace; font-size: 11px; background: #222; color: #0f0; padding: 15px; border-radius: 10px; width: 100%; margin-top: 20px; white-space: pre-wrap; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 20px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="update()">🔄 REFRESH TEST (185)</button>

    <div class="card">
        <h2>Bus Stop 27449 (Test)</h2>
        <div id="display">Ready to test...</div>
    </div>

    <div id="log">Log: System Ready</div>
</div>

<script>
    // I've kept your key here - make sure it matches your LTA email exactly
    const KEY = '5WOBIXmsSTyK2fmx1NqlSA==';

    async function update() {
        const logBox = document.getElementById('log');
        const display = document.getElementById('display');
        
        logBox.innerText = "Log: Fetching...";
        display.innerHTML = "Connecting to LTA...";

        try {
            const stopId = '27449';
            const busNo = '185';
            
            // Using a more robust proxy URL structure
            const ltaUrl = `http://datamall2.mytransport.sg/ltaodataservice/BusArrivalv2?BusStopCode=${stopId}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(ltaUrl)}`;

            const response = await fetch(proxyUrl, {
                headers: { 
                    'AccountKey': KEY,
                    'Accept': 'application/json'
                }
            });

            const wrapper = await response.json();
            
            if (!wrapper.contents) {
                throw new Error("Proxy returned empty. Is your API key active?");
            }

            // The data comes back as a string, we turn it into an object
            const data = JSON.parse(wrapper.contents);
            
            if (data.Services) {
                let found = false;
                let html = "";
                
                data.Services.forEach(s => {
                    if (s.ServiceNo === busNo) {
                        found = true;
                        const arrival = s.NextBus.EstimatedArrival;
                        let wait = "No data";
                        if (arrival) {
                            const diff = new Date(arrival) - new Date();
                            const mins = Math.max(0, Math.floor(diff / 60000));
                            wait = mins <= 0 ? "Arr" : mins + "m";
                        }
                        html = `<div class="bus-row"><span>Bus ${busNo}</span><span class="time">${wait}</span></div>`;
                    }
                });

                display.innerHTML = found ? html : "Bus 185 not found at this stop.";
                logBox.innerText = "Log: Success! Updated at " + new Date().toLocaleTimeString();
            } else {
                throw new Error("Invalid data format from LTA");
            }

        } catch (err) {
            logBox.innerText = "Log Error: " + err.message;
            display.innerHTML = "<span style='color:red'>Key Rejected or Proxy Busy</span>";
            console.error(err);
        }
    }

    // Auto-run on start
    window.onload = update;
</script>
</body>
</html>
