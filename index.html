<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusWatch SG</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2128;
      --border: #252830;
      --accent: #e8ff47;
      --accent2: #47c8ff;
      --text: #e8eaf0;
      --muted: #6b7080;
      --green: #4ade80;
      --orange: #fb923c;
      --red: #f87171;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      padding: 36px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -150px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(232,255,71,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .bus-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #0d0f14;
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 2px;
      margin-bottom: 10px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .dot.error { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Location bar ── */
    .location-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .loc-icon { font-size: 16px; flex-shrink: 0; }

    .loc-text {
      flex: 1;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.03em;
      min-width: 0;
    }

    .loc-text strong { color: var(--text); }

    .btn-show-all {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 5px 12px;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(232,255,71,0.3);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-show-all:hover { background: rgba(232,255,71,0.08); }
    .btn-show-all.active { background: rgba(232,255,71,0.15); }

    /* ── Controls row ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .view-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .view-toggle button {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 6px 12px;
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-toggle button.active { background: var(--accent); color: #0d0f14; font-weight: 600; }

    .refresh-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
    }

    .toggle { position: relative; width: 34px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .slider { background: rgba(232,255,71,0.2); }
    input:checked + .slider::before { transform: translateX(16px); background: var(--accent); }

    .btn-refresh {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      margin-left: auto;
    }

    .btn-refresh:hover { background: #d4e83a; }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── No nearby stops message ── */
    .no-nearby {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      display: none;
    }

    .no-nearby.show { display: block; }
    .no-nearby .icon { font-size: 32px; margin-bottom: 12px; }
    .no-nearby p { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .no-nearby strong { color: var(--text); }

    /* ── Groups ── */
    .groups { display: flex; flex-direction: column; gap: 16px; }

    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: opacity 0.3s, transform 0.3s;
    }

    .group.hidden {
      display: none;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .stop-code {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(232,255,71,0.08);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .stop-name { font-size: 13px; color: var(--text); flex: 1; min-width: 0; }
    .stop-road { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    /* distance badge */
    .dist-badge {
      font-size: 10px;
      color: var(--accent2);
      background: rgba(71,200,255,0.1);
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.04em;
    }

    /* ── Bus rows ── */
    .bus-rows { display: flex; flex-direction: column; }

    .bus-row {
      display: grid;
      align-items: center;
      padding: 12px 18px;
      gap: 8px;
      min-height: 54px;
    }

    .bus-row + .bus-row { border-top: 1px solid var(--border); }

    .mode-next  .bus-row { grid-template-columns: 64px 1fr; }
    .mode-three .bus-row { grid-template-columns: 64px 1fr 1fr 1fr; }

    .bus-num {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent2);
      letter-spacing: -0.02em;
    }

    .arrival-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .mode-next .arrival-cell { flex-direction: row; align-items: center; gap: 10px; }

    .slot-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .mode-next .slot-label { display: none; }

    .slot-time { font-size: 20px; font-weight: 500; line-height: 1; }
    .mode-next .slot-time { font-size: 28px; }

    .slot-time.soon   { color: var(--red); }
    .slot-time.coming { color: var(--orange); }
    .slot-time.later  { color: var(--green); }
    .slot-time.na     { color: var(--muted); font-size: 16px !important; }

    .slot-unit { font-size: 10px; color: var(--muted); }
    .mode-next .slot-unit { font-size: 13px; }

    .bus-tag {
      display: inline-block;
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 2px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .mode-next .bus-tag { margin-top: 0; font-size: 9px; padding: 2px 6px; }

    .bus-tag.wab { background: rgba(71,200,255,0.15); color: var(--accent2); }
    .bus-tag.sd  { background: rgba(232,255,71,0.1);  color: var(--accent); }
    .bus-tag.dd  { background: rgba(251,146,60,0.15); color: var(--orange); }

    .slot-time.loading-val { color: var(--muted); font-size: 16px !important; animation: blink 1.2s infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .error-row { padding: 14px 18px; font-size: 11px; color: var(--red); }

    .updated-bar { margin-top: 18px; text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }

    footer { margin-top: 8px; text-align: center; font-size: 10px; color: var(--muted); opacity: 0.5; letter-spacing: 0.05em; }

    @media (max-width: 480px) {
      .mode-three .bus-row { grid-template-columns: 50px 1fr 1fr 1fr; padding: 10px 12px; }
      .mode-next  .bus-row { padding: 10px 12px; }
      .bus-num { font-size: 18px; }
      .mode-three .slot-time { font-size: 17px; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <div class="bus-badge">🚌 SG Transit</div>
      <h1>BUS<span>WATCH</span></h1>
      <p class="subtitle">Real-time arrivals · Jurong West / Bukit Batok / Tengah</p>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Loading…</span>
      </div>
    </div>
  </header>

  <!-- Location bar -->
  <div class="location-bar">
    <span class="loc-icon" id="locIcon">📍</span>
    <span class="loc-text" id="locText">Detecting your location…</span>
    <button class="btn-show-all" id="btnShowAll" onclick="toggleShowAll()">Show all stops</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="view-toggle">
      <button id="btnNext"              onclick="setView('next')">Next only</button>
      <button id="btnThree" class="active" onclick="setView('three')">Next 3</button>
    </div>
    <label class="refresh-toggle">
      <div class="toggle">
        <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()" />
        <span class="slider"></span>
      </div>
      Auto 30s
    </label>
    <button class="btn-refresh" id="refreshBtn" onclick="fetchAll()">↻ Refresh</button>
  </div>

  <!-- No nearby stops message -->
  <div class="no-nearby" id="noNearby">
    <div class="icon">🗺️</div>
    <p>No tracked stops within <strong>400m</strong> of your current location.<br>Tap <strong>Show all stops</strong> to view everything.</p>
  </div>

  <div class="groups mode-three" id="groups"></div>

  <div class="updated-bar" id="updatedBar"></div>
  <footer>Data from LTA DataMall · Timings are estimates only</footer>

</div>
<script>
  const WORKER  = 'https://ltaproxy.snuffablescoopy.workers.dev';
  const LTA_URL = 'https://datamall2.mytransport.sg/ltaodataservice/v3/BusArrival';
  const RADIUS  = 400; // metres

  // Stop coordinates sourced from LTA/OpenStreetMap
  const STOPS = [
    { code: '22009', name: 'Boon Lay Int',           road: 'Jurong West Ctrl 3',      lat: 1.34034, lng: 103.70575, buses: ['181', '180'] },
    { code: '21581', name: 'Blk 65',                 road: 'Corporation Dr',           lat: 1.33394, lng: 103.70842, buses: ['98'] },
    { code: '27449', name: 'Aft Westwood Ave',        road: 'Jurong West Ave 5',       lat: 1.33059, lng: 103.69740, buses: ['185'] },
    { code: '21161', name: 'Blk 216B',               road: 'Jurong West',              lat: 1.34498, lng: 103.71365, buses: ['157', '185'] },
    { code: '43531', name: 'Blk 140',                road: 'Bt Batok West Ave 3',      lat: 1.34785, lng: 103.74394, buses: ['157', '174'] },
    { code: '43769', name: 'Dulwich Coll / Blk 445', road: 'Bt Batok Rd',             lat: 1.34339, lng: 103.75806, buses: ['180'] },
    { code: '40389', name: 'Blk 119',                road: 'Plantation Cres, Tengah',  lat: 1.37276, lng: 103.74398, buses: ['992'] },
  ];

  let autoTimer   = null;
  let viewMode    = 'three';
  let showAll     = false;
  let userLat     = null;
  let userLng     = null;
  let coordsReady = false;

  // ── Haversine distance in metres ──
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
    return R * 2 * Math.asin(Math.sqrt(a));
  }

  // ── Geolocation ──
  function initLocation() {
    if (!navigator.geolocation) {
      setLocText('📍', 'Location not supported by this browser. Showing all stops.');
      showAllStops();
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        coordsReady = true;
        applyLocationFilter();
      },
      err => {
        let msg = 'Location unavailable. Showing all stops.';
        if (err.code === 1) msg = 'Location permission denied. Showing all stops.';
        setLocText('⚠️', msg);
        showAllStops();
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
  }

  function applyLocationFilter() {
    if (!coordsReady || showAll) return;

    // Calculate distance for each stop
    let nearbyCount = 0;
    STOPS.forEach(stop => {
      stop.distance = Math.round(haversine(userLat, userLng, stop.lat, stop.lng));
    });

    const nearby = STOPS.filter(s => s.distance <= RADIUS);
    nearbyCount = nearby.length;

    // Update each group card
    STOPS.forEach(stop => {
      const el = document.getElementById(`group-${stop.code}`);
      if (!el) return;
      const isNearby = stop.distance <= RADIUS;
      el.classList.toggle('hidden', !isNearby);

      // Update distance badge
      const badge = el.querySelector('.dist-badge');
      if (badge) badge.textContent = `${stop.distance}m`;
    });

    // Show/hide "no nearby" message
    document.getElementById('noNearby').classList.toggle('show', nearbyCount === 0);

    // Update location bar text
    if (nearbyCount === 0) {
      setLocText('📍', `You are <strong>${STOPS.map(s=>s.distance).sort((a,b)=>a-b)[0]}m</strong> from the nearest tracked stop (${RADIUS}m radius active)`);
    } else {
      const names = nearby.map(s => s.name).join(', ');
      setLocText('📍', `Within <strong>${RADIUS}m</strong>: ${names}`);
    }
  }

  function showAllStops() {
    showAll = true;
    STOPS.forEach(stop => {
      const el = document.getElementById(`group-${stop.code}`);
      if (el) el.classList.remove('hidden');
    });
    document.getElementById('noNearby').classList.remove('show');
    document.getElementById('btnShowAll').classList.add('active');
    document.getElementById('btnShowAll').textContent = 'Showing all';
  }

  function toggleShowAll() {
    if (showAll) {
      // Go back to location filter
      showAll = false;
      document.getElementById('btnShowAll').classList.remove('active');
      document.getElementById('btnShowAll').textContent = 'Show all stops';
      if (coordsReady) applyLocationFilter();
    } else {
      showAllStops();
    }
  }

  function setLocText(icon, html) {
    document.getElementById('locIcon').textContent = icon;
    document.getElementById('locText').innerHTML = html;
  }

  // ── View toggle ──
  function setView(mode) {
    viewMode = mode;
    document.getElementById('groups').className =
      mode === 'next' ? 'groups mode-next' : 'groups mode-three';
    document.getElementById('btnNext').className  = mode === 'next'  ? 'active' : '';
    document.getElementById('btnThree').className = mode === 'three' ? 'active' : '';
  }

  // ── Build skeleton ──
  function buildSkeleton() {
    const container = document.getElementById('groups');
    container.innerHTML = '';
    STOPS.forEach(stop => {
      const g = document.createElement('div');
      g.className = 'group hidden'; // hidden until location determined
      g.id = `group-${stop.code}`;
      g.innerHTML = `
        <div class="group-header">
          <span class="stop-code">${stop.code}</span>
          <span class="stop-name">${stop.name}</span>
          <span class="dist-badge">···</span>
          <span class="stop-road">${stop.road}</span>
        </div>
        <div class="bus-rows" id="rows-${stop.code}">
          ${stop.buses.map(skeletonRow).join('')}
        </div>`;
      container.appendChild(g);
    });
  }

  function skeletonRow(busNo) {
    return `<div class="bus-row">
      <div class="bus-num">${busNo}</div>
      <div class="arrival-cell"><div class="slot-label">Next</div><div class="slot-time loading-val">···</div></div>
      <div class="arrival-cell"><div class="slot-label">2nd</div><div class="slot-time loading-val">···</div></div>
      <div class="arrival-cell"><div class="slot-label">3rd</div><div class="slot-time loading-val">···</div></div>
    </div>`;
  }

  // ── Fetch via Worker ──
  async function fetchLTA(stopCode, busNo) {
    const target = `${LTA_URL}?BusStopCode=${stopCode}&ServiceNo=${busNo}`;
    const res = await fetch(`${WORKER}/?url=${encodeURIComponent(target)}`, {
      signal: AbortSignal.timeout(10000)
    });
    if (!res.ok) throw new Error(`Worker responded ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data.Services)) throw new Error('Unexpected response format');
    return data;
  }

  function getMin(iso) {
    if (!iso || iso.startsWith('0001') || iso === '') return null;
    const diff = (new Date(iso) - Date.now()) / 60000;
    if (diff < -2) return null;
    return Math.max(0, Math.round(diff));
  }

  // ── Fetch all stops ──
  async function fetchAll() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    setStatus('Fetching…', '');

    const results = await Promise.allSettled(STOPS.map(fetchStop));
    const errors  = results.filter(r => r.status === 'rejected' || r.value === false).length;

    if (errors === 0)               setStatus('Live', 'live');
    else if (errors < STOPS.length) setStatus(`Live (${errors} error${errors > 1 ? 's' : ''})`, 'live');
    else                            setStatus('Failed to load', 'error');

    document.getElementById('updatedBar').textContent =
      'Last updated: ' + new Date().toLocaleTimeString('en-SG', { hour12: false });
    btn.disabled = false;
  }

  async function fetchStop(stop) {
    const el = document.getElementById(`rows-${stop.code}`);
    try {
      const rows = await Promise.all(stop.buses.map(async busNo => {
        const data = await fetchLTA(stop.code, busNo);
        return renderRow(busNo, data.Services?.[0] ?? null);
      }));
      el.innerHTML = rows.join('');
      return true;
    } catch (e) {
      el.innerHTML = `<div class="error-row">⚠ Could not load stop ${stop.code}: ${e.message}</div>`;
      return false;
    }
  }

  function renderRow(busNo, svc) {
    const buses  = svc ? [svc.NextBus, svc.NextBus2, svc.NextBus3] : [null, null, null];
    const labels = ['Next', '2nd', '3rd'];

    const cells = buses.map((b, i) => {
      const min = getMin(b?.EstimatedArrival);
      let timeEl, unitEl = '', tagEl = '';

      if (min === null) {
        timeEl = `<div class="slot-time na">—</div>`;
      } else if (min === 0) {
        timeEl = `<div class="slot-time soon">Arr</div>`;
      } else {
        const cls = min <= 3 ? 'soon' : min <= 8 ? 'coming' : 'later';
        timeEl = `<div class="slot-time ${cls}">${min}</div>`;
        unitEl = `<div class="slot-unit">min</div>`;
      }

      if (b?.Type) {
        const m = { WAB: ['wab','WAB'], SD: ['sd','SD'], DD: ['dd','DD'] };
        const [c, l] = m[b.Type] || ['sd', b.Type];
        tagEl = `<span class="bus-tag ${c}">${l}</span>`;
      }

      return `<div class="arrival-cell">
        <div class="slot-label">${labels[i]}</div>
        ${timeEl}${unitEl}${tagEl}
      </div>`;
    }).join('');

    return `<div class="bus-row"><div class="bus-num">${busNo}</div>${cells}</div>`;
  }

  function setStatus(text, state) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('statusDot').className =
      'dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  }

  function toggleAutoRefresh() {
    clearInterval(autoTimer);
    if (document.getElementById('autoRefresh').checked) {
      autoTimer = setInterval(fetchAll, 30000);
    }
  }

  // ── Init ──
  buildSkeleton();
  fetchAll();
  autoTimer = setInterval(fetchAll, 30000);
  initLocation(); // ask for location immediately
</script>
</body>
</html>
